apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-config
  namespace: default
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: "Predictive Autoscaler"
        orgId: 1
        folder: "Autoscaler"
        type: file
        disableDeletion: true
        options:
          path: /var/lib/grafana/dashboards
