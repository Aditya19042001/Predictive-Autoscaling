apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: predictive-autoscaler-binding
subjects:
  - kind: ServiceAccount
    name: predictive-autoscaler-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: predictive-autoscaler-role
  apiGroup: rbac.authorization.k8s.io
